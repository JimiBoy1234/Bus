<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A&amp;W Bus Stops - Next Buses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>A&amp;W Bus Stops - Next Buses</h1>
        <div class="meta">
          <span id="status-pill" class="pill">Loading live data...</span>
          <button id="refresh-button" class="refresh-button cat-button" type="button" aria-label="Refresh now">
            <span class="cat-face" aria-hidden="true">
              <span class="cat-ears"></span>
              <span class="cat-eyes"></span>
              <span class="cat-nose"></span>
            </span>
            <span class="cat-label">Refresh now</span>
          </button>
        </div>
      </section>

      <section>
        <div id="board" class="board" aria-live="polite"></div>
      </section>
    </main>

    <template id="stop-template">
      <article class="stop-card">
        <div class="stop-header">
          <div class="stop-title-row">
            <span class="stop-cat" aria-hidden="true"></span>
            <div class="stop-title-block">
              <p class="stop-label"></p>
              <h2 class="stop-name"></h2>
              <p class="stop-note"></p>
            </div>
          </div>
          <div class="stop-id"></div>
        </div>
        <div class="prediction-list"></div>
        <button class="map-link" type="button">View on map</button>
        <div class="inline-map-wrap is-hidden">
          <div class="inline-map-copy">
            <div class="inline-map-title-row">
              <span class="inline-map-cat" aria-hidden="true"></span>
              <p class="inline-map-title">Nearby live buses</p>
            </div>
            <p class="inline-map-subtitle">Focused on this stop and its active routes.</p>
          </div>
          <div class="inline-map"></div>
        </div>
      </article>
    </template>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js" defer></script>
  </body>
</html>
